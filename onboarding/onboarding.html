<!doctype html>
<html lang="en" data-ui-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Private-C — Setup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, sans-serif;
        background: hsl(0 0% 6%);
        color: hsl(0 0% 92%);
        padding: 1.5rem;
      }
      .panel {
        width: 100%;
        max-width: 26rem;
        border: 1px solid hsl(0 0% 18%);
        padding: 2rem;
        text-align: center;
        background: hsl(0 0% 9%);
      }
      .eyebrow {
        font-size: 10px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: hsl(0 0% 55%);
        margin: 0 0 1rem;
      }
      p {
        margin: 0 0 0.75rem;
        font-size: 14px;
        line-height: 1.45;
        color: hsl(0 0% 75%);
      }
      a {
        display: inline-block;
        margin-top: 0.5rem;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: hsl(0 0% 92%);
        border: 1px solid hsl(0 0% 35%);
        padding: 0.5rem 1rem;
        text-decoration: none;
      }
      a:hover {
        border-color: hsl(0 0% 55%);
        background: hsl(0 0% 12%);
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <p class="eyebrow">Private-C</p>
      <p style="color: hsl(0 0% 92%)">Setup uses the same dashboard as the full extension UI.</p>
      <p>Sign in or create an account, then choose your preferences.</p>
      <a id="continue" href="#">Open setup</a>
    </div>
    <script src="onboarding.js"></script>
  </body>
</html>
